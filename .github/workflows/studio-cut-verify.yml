name: Studio Cut Verify

on:
  pull_request:
    paths:
      - "apps/studio-cut-web/**"
      - "packages/studio-cut-schema/**"
      - "tools/studio-cut-local/**"
      - "tools/studio-cut-cloud-sync/**"
      - "scripts/studio-cut-*.mjs"
      - "scripts/verify-studio-cut.mjs"
      - "firebase.json"
      - "firestore.rules"
      - "storage.rules"
      - "package.json"
      - "pnpm-lock.yaml"
      - "docs/studio-cut*.md"
      - ".github/workflows/studio-cut-verify.yml"
  push:
    paths:
      - "apps/studio-cut-web/**"
      - "packages/studio-cut-schema/**"
      - "tools/studio-cut-local/**"
      - "tools/studio-cut-cloud-sync/**"
      - "scripts/studio-cut-*.mjs"
      - "scripts/verify-studio-cut.mjs"
      - "firebase.json"
      - "firestore.rules"
      - "storage.rules"
      - "package.json"
      - "pnpm-lock.yaml"
      - "docs/studio-cut*.md"
      - ".github/workflows/studio-cut-verify.yml"

permissions:
  contents: read

jobs:
  verify:
    name: Verify Studio Cut
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Java for Firebase emulators
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Studio Cut verification
        run: pnpm studio-cut:verify

      - name: Upload web smoke failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: studio-cut-web-smoke-artifacts
          path: tools/studio-cut-local/output/web-smoke-artifacts
          if-no-files-found: ignore
          retention-days: 14

      - name: Write Studio Cut verification summary
        if: always()
        run: |
          {
            echo "## Studio Cut verification"
            echo ""
            echo "- Result: ${{ job.status }}"
            echo "- Command: \`pnpm studio-cut:verify\`"
            echo "- Failure artifact name: \`studio-cut-web-smoke-artifacts\`"
            echo "- Failure artifact path: \`tools/studio-cut-local/output/web-smoke-artifacts\`"
            echo "- CI boundary: verify-only; this workflow does not deploy to Firebase Hosting/rules and does not use secrets."
          } >> "$GITHUB_STEP_SUMMARY"
