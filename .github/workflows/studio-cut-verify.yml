name: Studio Cut Verify

on:
  pull_request:
    paths:
      - "apps/studio-cut-web/**"
      - "packages/studio-cut-schema/**"
      - "tools/studio-cut-local/**"
      - "scripts/verify-studio-cut.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "docs/studio-cut.md"
      - ".github/workflows/studio-cut-verify.yml"
  push:
    paths:
      - "apps/studio-cut-web/**"
      - "packages/studio-cut-schema/**"
      - "tools/studio-cut-local/**"
      - "scripts/verify-studio-cut.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "docs/studio-cut.md"
      - ".github/workflows/studio-cut-verify.yml"

permissions:
  contents: read

jobs:
  verify:
    name: Verify Studio Cut
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Studio Cut verification
        run: pnpm studio-cut:verify
