name: Deploy Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: Cloud Run service to deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - web
          - studio
          - auto

concurrency:
  group: cloud-run-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT: high-ground-odyssey
  GCP_REGION: us-central1
  WIF_PROVIDER: projects/659427658635/locations/global/workloadIdentityPools/github-actions/providers/github
  DEPLOYER_SERVICE_ACCOUNT: github-actions-deployer@high-ground-odyssey.iam.gserviceaccount.com
  NEXT_TELEMETRY_DISABLED: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  plan:
    name: Plan deploy
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.plan.outputs.web }}
      studio: ${{ steps.plan.outputs.studio }}
      schema: ${{ steps.plan.outputs.schema }}
      summary: ${{ steps.plan.outputs.summary }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Choose deploy targets
        id: plan
        shell: bash
        env:
          TARGET: ${{ github.event.inputs.target || 'auto' }}
        run: |
          set -euo pipefail

          web=false
          studio=false
          schema=false
          summary="No deployable app changes detected."

          case "$TARGET" in
            all)
              web=true
              studio=true
              schema=true
              summary="Manual deploy requested for web and studio."
              ;;
            web)
              web=true
              summary="Manual deploy requested for web."
              ;;
            studio)
              studio=true
              schema=true
              summary="Manual deploy requested for studio."
              ;;
            auto)
              base="${{ github.event.before }}"

              if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
                base="$(git rev-parse "${GITHUB_SHA}^")"
              fi

              changed="$(git diff --name-only "$base" "$GITHUB_SHA")"
              web_re='^(apps/web/|packages/|prisma/|package.json$|pnpm-lock.yaml$|pnpm-workspace.yaml$|cloudbuild\.web\.yaml$|scripts/web-cloud-run|scripts/release/quipsly-|\.github/workflows/deploy-cloud-run\.yml$|\.dockerignore$)'
              studio_re='^(apps/quipsly/|packages/|prisma/|package.json$|pnpm-lock.yaml$|pnpm-workspace.yaml$|cloudbuild\.studio(\.deploy)?\.yaml$|scripts/studio-cloud-run|scripts/release/quipsly-|\.github/workflows/deploy-cloud-run\.yml$|\.dockerignore$)'
              schema_re='^(prisma/|ops/|scripts/quipsly-nest-chat-schema-push\.mjs$|scripts/quipsly-production-core-schema-sync\.mjs$|scripts/release/quipsly-schema-sync\.sh$|scripts/release/quipsly-deploy-preview\.sh$|\.github/workflows/deploy-cloud-run\.yml$|cloudbuild\.prisma-migrate\.yaml$|package.json$|pnpm-lock.yaml$|pnpm-workspace.yaml$)'
              schema=false

              if grep -Eq "$schema_re" <<< "$changed"; then
                schema=true
              fi

              if grep -Eq "$web_re" <<< "$changed"; then
                web=true
              fi

              if grep -Eq "$studio_re" <<< "$changed"; then
                studio=true
              fi

              if [[ "$web" == "true" || "$studio" == "true" ]]; then
                summary="Auto deploy planned from changed app/runtime files."
              fi
              ;;
            *)
              echo "Unknown target: $TARGET" >&2
              exit 1
              ;;
          esac

          echo "web=$web" >> "$GITHUB_OUTPUT"
          echo "studio=$studio" >> "$GITHUB_OUTPUT"
          echo "schema=$schema" >> "$GITHUB_OUTPUT"
          echo "summary=$summary" >> "$GITHUB_OUTPUT"
          echo "$summary"
          echo "web=$web"
          echo "studio=$studio"
          echo "schema=$schema"

  deploy-web:
    name: Deploy web
    needs: plan
    if: needs.plan.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Deploy web Cloud Run
        env:
          GCLOUD_PROJECT: ${{ env.GCP_PROJECT }}
          WEB_CLOUD_RUN_PROJECT: ${{ env.GCP_PROJECT }}
          WEB_CLOUD_RUN_REGION: ${{ env.GCP_REGION }}
          WEB_IMAGE_TAG: ${{ github.sha }}
          WEB_IMAGE_BUILD_STRATEGY: docker
        run: pnpm web:cloudrun:deploy

  deploy-studio:
    name: Deploy studio
    needs: plan
    if: needs.plan.outputs.studio == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Run Release Preflight
        env:
          PROJECT_ID: ${{ env.GCP_PROJECT }}
          REGION: ${{ env.GCP_REGION }}
        run: bash scripts/release/quipsly-release-preflight.sh

      - name: Build Prisma Migration Image
        if: needs.plan.outputs.schema == 'true'
        env:
          IMAGE_URI: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/high-ground-studio/prisma-migrate:${{ github.sha }}
          LATEST_URI: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/high-ground-studio/prisma-migrate:latest
        run: |
          docker buildx build \
            --file ops/prisma-migrate.Dockerfile \
            --tag "$IMAGE_URI" \
            --tag "$LATEST_URI" \
            --push \
            .

      - name: Run Schema Sync (DB Migrations)
        if: needs.plan.outputs.schema == 'true'
        env:
          PROJECT_ID: ${{ env.GCP_PROJECT }}
          REGION: ${{ env.GCP_REGION }}
          IMAGE_TAG: ${{ github.sha }}
          SKIP_BUILD: "1"
        run: bash scripts/release/quipsly-schema-sync.sh

      - name: Build Studio Image
        env:
          IMAGE_URI: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/high-ground-studio/studio:${{ github.sha }}
          LATEST_URI: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/high-ground-studio/studio:latest
        run: |
          docker buildx build \
            --file apps/quipsly/Dockerfile \
            --build-arg NEXT_PUBLIC_STUDIO_COLLAB_URL=wss://studio-collab-hm2odnvjga-uc.a.run.app \
            --build-arg STUDIO_COLLAB_URL=wss://studio-collab-hm2odnvjga-uc.a.run.app \
            --build-arg QUIPSLY_DOCKER_IGNORE_TYPE_ERRORS=0 \
            --tag "$IMAGE_URI" \
            --tag "$LATEST_URI" \
            --push \
            .

      - name: Deploy Studio Preview Revision
        env:
          PROJECT_ID: ${{ env.GCP_PROJECT }}
          REGION: ${{ env.GCP_REGION }}
          IMAGE_TAG: ${{ github.sha }}
          SOURCE_SHA: ${{ github.sha }}
          DEPLOYED_BY: "GitHub Actions"
          SKIP_BUILD: "1"
        run: bash scripts/release/quipsly-deploy-preview.sh

      - name: Resolve Preview URL
        run: |
          PREVIEW_URL=$(gcloud run services describe studio --region ${{ env.GCP_REGION }} --format='value(status.traffic[?(@.tag=="quipsly-preview")].url)')
          echo "Resolved PREVIEW_URL: $PREVIEW_URL"
          echo "PREVIEW_URL=$PREVIEW_URL" >> "$GITHUB_ENV"

      - name: Smoke Test Preview
        env:
          HOST_HEADER: nest.quipsly.com
        run: bash scripts/release/quipsly-smoke-preview.sh

      - name: Promote Preview to Production
        env:
          REGION: ${{ env.GCP_REGION }}
        run: bash scripts/release/quipsly-promote-preview.sh
