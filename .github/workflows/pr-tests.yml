name: PR Tests

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Run Quipsly Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck Quipsly
        run: pnpm --filter quipsly exec tsc --noEmit --incremental false

      - name: Build Quipsly
        env:
          NEXT_PUBLIC_STUDIO_COLLAB_URL: wss://studio-collab-hm2odnvjga-uc.a.run.app
          STUDIO_COLLAB_URL: wss://studio-collab-hm2odnvjga-uc.a.run.app
        run: pnpm --filter quipsly build

      - name: Validate release scripts and workflows
        run: |
          ruby -e 'require "yaml"; YAML.load_file(".github/workflows/deploy-cloud-run.yml"); YAML.load_file(".github/workflows/pr-tests.yml"); puts "YAML OK"'
          bash -n scripts/release/quipsly-release-preflight.sh
          bash -n scripts/release/quipsly-smoke-preview.sh
          bash -n scripts/release/quipsly-schema-sync.sh
          bash -n scripts/release/quipsly-deploy-preview.sh
          bash -n scripts/release/quipsly-promote-preview.sh
