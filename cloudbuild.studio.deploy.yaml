substitutions:
  _REGION: us-central1
  _ARTIFACT_REPOSITORY: high-ground-studio
  _IMAGE_NAME: studio
  _IMAGE_TAG: manual
  _SERVICE_NAME: studio
  _NEXT_PUBLIC_STUDIO_COLLAB_URL: wss://studio-collab-hm2odnvjga-uc.a.run.app
  _STUDIO_COLLAB_URL: wss://studio-collab-hm2odnvjga-uc.a.run.app
  _QUIPSLY_DOCKER_IGNORE_TYPE_ERRORS: "1"

steps:
  - id: build-studio-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file
      - apps/quipsly/Dockerfile
      - --build-arg
      - NEXT_PUBLIC_STUDIO_COLLAB_URL=${_NEXT_PUBLIC_STUDIO_COLLAB_URL}
      - --build-arg
      - STUDIO_COLLAB_URL=${_STUDIO_COLLAB_URL}
      - --build-arg
      - QUIPSLY_DOCKER_IGNORE_TYPE_ERRORS=${_QUIPSLY_DOCKER_IGNORE_TYPE_ERRORS}
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}
      - .

  - id: deploy-studio-service
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}
      - --region=${_REGION}
      - --update-env-vars=NEXT_PUBLIC_STUDIO_COLLAB_URL=${_NEXT_PUBLIC_STUDIO_COLLAB_URL},STUDIO_COLLAB_URL=${_STUDIO_COLLAB_URL}
      - --quiet

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}
