version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: high-ground-db
    environment:
      POSTGRES_USER: wall_e
      POSTGRES_PASSWORD: antigravity_password
      POSTGRES_DB: high_ground_telemetry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
