substitutions:
  _REGION: us-central1
  _REPOSITORY: high-ground-studio
  _IMAGE_NAME: prisma-migrate
  _IMAGE_TAG: latest

steps:
  - name: gcr.io/kaniko-project/executor:latest
    args:
      - --destination=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}
      - --destination=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest
      - --cache=true
      - --cache-ttl=168h
      - --dockerfile=ops/prisma-migrate.Dockerfile

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}

options:
  logging: CLOUD_LOGGING_ONLY
